name: Validar site React

on:
  push:
    branches: ["vercel-react-prod"]
  pull_request:
    branches: ["vercel-react-prod"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run check
      - name: Build static site
        run: npm run build
