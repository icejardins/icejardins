baseURL = 'https://icejardins.org.br/'
languageCode = 'pt-br'
title = 'ICE Jardins - Igreja Cristã Evangélica Jardins'
theme = 'hugo-profile'
enableRobotsTXT = true
hasCJKLanguage = false

defaultContentLanguage = 'pt'
defaultContentLanguageInSubdir = false

[outputs]
    home = ["HTML", "RSS", "JSON"]
    page = ["HTML", "RSS"]

[pagination]
    pagerSize = 10

[languages]
  [languages.pt]
    languageName = 'Português'
    contentDir = 'content'
    weight = 1

[params]
  favicon = "/images/fav.webp"
  animate = false
  description = "Igreja Cristã Evangélica Jardins, uma comunidade cristã no Jardim Botânico, em Brasília. Cultos aos domingos às 9h30 e Escola Bíblica às 11h."
  images = ["/images/sobre/congregacao.webp"]
  hostName = "https://icejardins.org.br"

[params.church]
  shortName = "ICE Jardins"
  fullName = "Igreja Cristã Evangélica Jardins"
  slogan = "Pessoas imperfeitas compartilhando a perfeição de Cristo"
  logoColor = "/images/branding/logo-color.png"
  logoWhite = "/images/branding/logo-white.png"
  logoBlack = "/images/branding/logo-black.png"
  email = "secretaria@icejardins.org.br"
  phone = "+55 61 98262-4952"
  whatsappNumber = "5561982624952"
  whatsapp = "https://api.whatsapp.com/send?phone=5561982624952"
  whatsappMessage = "Olá! Tenho interesse em visitar a ICE Jardins. Pode me ajudar?"
  venue = "Auditório do Colégio In-Nova"
  venueNote = "antigo COC Jardim Botânico"
  addressLine1 = "Condomínio Estância Jardim Botânico II"
  addressLine2 = "SH Jardim Botânico"
  cityRegion = "Brasília — DF"
  postalCode = "71686-301"
  serviceDay = "Domingos"
  worshipTime = "9h30"
  schoolTime = "11h"
  coffeeTime = "10h50"
  mapsUrl = "https://www.google.com/maps/dir/?api=1&destination=Col%C3%A9gio%20In-Nova%2C%20Condom%C3%ADnio%20Est%C3%A2ncia%20Jardim%20Bot%C3%A2nico%20II%2C%20Bras%C3%ADlia%20-%20DF%2C%2071686-301"
  mapEmbedUrl = "https://maps.google.com/maps?q=Col%C3%A9gio%20In-Nova%2C%20Condom%C3%ADnio%20Est%C3%A2ncia%20Jardim%20Bot%C3%A2nico%20II%2C%20Bras%C3%ADlia%20-%20DF%2C%2071686-301&t=&z=16&ie=UTF8&iwloc=&output=embed"

[params.font]
  fontSize = "1rem"
  fontWeight = 400
  lineHeight = 1.5
  textAlign = "left"

[params.theme]
  disableThemeToggle = true
  defaultTheme = "light"

[params.color]
  textColor                = "#1a1a1a"
  secondaryTextColor       = "#5f6f6c"
  textLinkColor            = "#126B67"
  backgroundColor          = "#fbfaf7"
  secondaryBackgroundColor = "#eef4f1"
  primaryColor             = "#126B67"
  secondaryColor           = "#f8f5ef"

[params.color.darkmode]
  textColor                = "#f5f5ef"
  secondaryTextColor       = "#b6c2bf"
  textLinkColor            = "#86d4c9"
  backgroundColor          = "#111817"
  secondaryBackgroundColor = "#182422"
  primaryColor             = "#86d4c9"
  secondaryColor           = "#1e2b29"

[params.navbar]
    align = "ms-auto"
    brandName = "ICE Jardins"
    disableSearch = true
    enableSeparator = false

[params.navbar.stickyNavBar]
    enable = true
    showOnScrollUp = true

[params.navbar.menus]
    disableAbout = false
    disableExperience = false
    disableEducation = false
    disableProjects = false
    disableAchievements = false
    disableContact = true

[params.contact]
    enable = true
    content = "Nossa equipe de atendimento está à disposição para responder suas perguntas, ouvir suas necessidades e orientar você em qualquer questão espiritual. Enviamos mensagens e bênçãos por todos os meios disponíveis para abençoar sua vida."
    btnName = "Fale conosco"
    btnLink = "https://api.whatsapp.com/send?phone=5561982624952"

[params.footer.recentPosts]
    path = "posts"
    count = 3
    title = "Publicações recentes"
    enable = true
    disableFeaturedImage = false

[params.footer.socialNetworks]
    facebook = "https://www.facebook.com/icejardins/"
    instagram = "https://www.instagram.com/icejardins/"
    whatsapp = "https://api.whatsapp.com/send?phone=5561982624952"

[params.datesFormat]
    article = "January 2, 2006"
    articleList = "January 2, 2006"
    articleRecent = "January 2, 2006"

[taxonomies]
    category = "categorias"
    tag = "tags"
    series = "series"

[permalinks]
    posts = "/:year/:month/:title/"

[[menu.main]]
    name = "Início"
    url = "/"
    weight = 1

[[menu.main]]
    name = "Visita"
    url = "/visita/"
    weight = 3

[[menu.main]]
    name = "No que cremos"
    url = "/fe/"
    weight = 4

[[menu.main]]
    name = "Sermões"
    url = "/posts/"
    weight = 5

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
